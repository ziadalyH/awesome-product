version: "3.9"

services:
  ai-agent:
    build: ./ai-agent
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./ai-agent:/app
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - AGENT_BASE_URL=http://ai-agent:8001
      - CORS_ORIGINS=["http://localhost:3000"]
    volumes:
      - ./backend:/app
    depends_on:
      - ai-agent
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    restart: unless-stopped
